<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT ACESSÓRIOS - Sistema de Gerenciamento de Estoque</title>
    <link rel="shortcut icon" href="/logo/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="font-poppins">

        <div class="container mx-auto">
            <div class="flex flex-col justify-center items-center mt-20">
                <div class="mb-5 flex items-center justify-center bg-blue-700 rounded-full h-20 w-20">
                    <img src="/logo/logo.png" alt="">
                </div>
                <h1 class="mb-2 text-3xl font-bold text-slate-800">RT ACESSÓRIOS</h1>
                <h3 class="font-medium text-slate-600">Sistema de Gerenciamento de Estoque</h3>
            </div>

            <div class="bg-gray-100 border-[0.1rem] border-gray-200 rounded-lg shadow-md p-5 max-w-lg mx-auto mt-5 mb-5">

                <div class="flex flex-col justify-start items-left space-y-2 mb-3">
                    <p class="text-lg font-medium">Entrar no Sistema</p>
                    <p class="text-sm font-light text-slate-600">Digite suas credenciais para acessar o sistema</p>
                </div>

                
                <div>
                    <label class="my-3" for="#">Usuário <span>*</span></label>

                </div>

                

               
                <div class="text-center mt-5 w-full hover:bg-slate-800
                 bg-slate-700 rounded-lg p-3 hover:transition-all hover:duration-300 
                 hover:ease-in-out cursor-pointer">
                    <a class="text-white" href="">
                        <button class="cursor-pointer">Entrar</button></a>
                </div>

            </div>
        </div>

    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
