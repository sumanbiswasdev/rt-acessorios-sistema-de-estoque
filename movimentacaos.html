<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerente de Estoque: Sistema de Gerenciamento de Estoque</title>
    <link rel="shortcut icon" href="/logo/logo_icon.png" type="image/x-icon">
    <link rel="stylesheet" href="src/output.css">
</head>
<body class="font-public-sans bg-gray-50">

        <div class="fixed mx-auto rounded-xl inset-0 bg-black bg-opacity-40 flex justify-center items-center overflow-auto p-5">

            <!-- Novo Produto -->
            <div class="bg-white p-8 mb-5 rounded-lg w-1/3">
                <p class="text-2xl mb-4 font-semibold">Novo Produto</p>

                <div class="grid grid-cols-2 gap-4">

                    <div>
                        <label class="text-black font-bold text-lg-center" for="">SKU <span class="text-red-600">*</span></label>
                        <input class="mt-2 w-full bg-gray-200 p-2 rounded-lg focus:outline-2 focus:outline-blue-600" type="text" name="" id="" placeholder="">
                    </div>

                    <div>
                        <label class="text-black font-bold text-lg-center" for="">Código de Barras <span class="text-red-600">*</span></label>
                        <input class="mt-2 w-full bg-gray-200 p-2 rounded-lg focus:outline-2 focus:outline-blue-600" type="text" name="" id="" placeholder="">
                    </div>

                </div>

                <!-- Nome do produto -->
                <div class="grid grid-cols-1 mt-4">
                    <div>
                        <label class="text-black font-bold text-lg-center" for="">Nome do produto <span class="text-red-600">*</span></label>
                        <input class="mt-2 w-full bg-gray-200 p-2 rounded-lg focus:outline-2 focus:outline-blue-600" type="text" name="" id="">
                    </div>

                </div>

                <!-- Descrição dos produtos -->
                <div class="grid grid-cols-1 mt-4">
                    <div>
                        <label class="text-black font-bold text-lg-center" for="">Descrição dos produtos <span class="text-red-600">*</span></label>
                        <input class="mt-2 h-16 w-full bg-gray-200 p-2 rounded-lg focus:outline-2 focus:outline-blue-600" type="text" name="" id="">
                        
                    </div>
                </div>

                <!-- Catagoria de produtos -->
                <div class="grid grid-cols-2 mt-5 gap-4">

                    <!-- Catagoria de produtos-->
                    <div class="relative inline-block">

                        <label class="text-black font-bold text-lg-center" for="">Catagoria 
                            <span class="text-red-600">*</span></label>


                            <div class="flex items-center bg-gray-200 rounded-lg mt-1">
                                <button id="dropdownBtn" class="px-4 py-2 text-left w-full">
                                    Selecione</button>
                                <i class="pr-2 fa-solid fa-angle-down mr-2"></i>
                            </div>

                            <ul id="dropdownMenu" class="absolute hidden bg-white rounded-lg border-[0.1rem] shadow border-gray-200 w-full mt-1 p-1">

                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Capas de Celular</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Peliculas Protetoras</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Cabos e Carregadores</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Produtos para TV</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Informatica</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Fones de Ouvido</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Smartwatch</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Gaming</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Acessorios Diversos</a></li>
                            </ul>
                    </div>
                    
                    <!-- Fornecedor -->
                    <div class="relative inline-block">

                        <label class="text-black font-bold text-lg-center" for="">Fornecedor 
                            <span class="text-red-600">*</span></label>


                            <div class="flex items-center bg-gray-200 rounded-lg mt-1">
                                <button id="fornecedorBtn" class="px-4 py-2 text-left  w-full">
                                    Selecione</button>
                                <i class="pr-2 fa-solid fa-angle-down mr-2"></i>
                            </div>

                            <ul id="listadeFornecedor" class="absolute hidden bg-white rounded-lg border-[0.1rem] shadow border-gray-200 w-full mt-1 p-1" >

                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Cell Accessories Distribuidora</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Tech Import brasil</a></li>
                                <li><a href="#" class="block px-4 py-2 text-sm rounded-lg text-gray-700 font-medium hover:bg-gray-200">Mobile Parts Ltda</a></li>
                                
                            </ul>
                    </div>

                    
                </div>

                <!-- Estoque minimo / Estoque Atual / Preço Unitarios -->
                 <div class="grid grid-cols-3 mt-4 gap-4">
                    
                     <div>
                        <label class="block text-black font-bold text-lg-center">Estoque mínimo 
                        <span class="text-red-600">*</span></label>

                        <div class="flex items-center bg-gray-100 rounded-lg mt-2 p-2">
                            
                            <input id="minStock" value="0" 
                            class="w-full bg-transparent outline-none">
                            
                            <!-- botao + e - -->
                            <div class="flex flex-col ml-2">
                                <button id="btnUp" class="text-gray-600 hover:text-black 
                                leading-none"><i class="fa-solid fa-caret-up"></i></i></button>
                                <button id="btnDown" class="text-gray-600 hover:text-black leading-none"><i class="fa-solid fa-caret-down"></i></i></button>
                            </div>
                            
                        </div>
                     </div>

                     <!-- Estoque Atual -->
                     <div>
                        <label class="block text-black font-bold text-lg-center">Estoque Atual 
                        <span class="text-red-600">*</span></label>

                        <div class="flex items-center bg-gray-100 rounded-lg mt-2 p-2">
                            
                            <input id="estoueInput" value="0" 
                            class="w-full bg-transparent outline-none">
                            
                            <!-- botao + e - -->
                            <div class="flex flex-col ml-2">
                                <button id="estoueUp" class="text-gray-600 hover:text-black 
                                leading-none"><i class="fa-solid fa-caret-up"></i></i></button>
                                <button id="estoueDown" class="text-gray-600 hover:text-black leading-none"><i class="fa-solid fa-caret-down"></i></i></button>
                            </div>
                            
                        </div>
                     </div>

                     <!-- Preço Unitários -->
                     <div>
                        <label class="block text-black font-bold text-lg-center">Preço Unitários 
                        <span class="text-red-600">*</span></label>

                        <div class="flex items-center bg-gray-100 rounded-lg mt-2 p-2">
                            
                            <input id="unitariosInput" value="0" 
                            class="w-full bg-transparent outline-none">
                            
                            <!-- botao + e - -->
                            <div class="flex flex-col ml-2">
                                <button id="unitariosUp" class="text-gray-600 hover:text-black 
                                leading-none"><i class="fa-solid fa-caret-up"></i></i></button>
                                <button id="unitariosDown" class="text-gray-600 hover:text-black leading-none"><i class="fa-solid fa-caret-down"></i></i></button>
                            </div>
                            
                        </div>
                     </div>


                 </div>

                 <div class="flex justify-end items-center mt-5 gap-2">
                    <button class="bg-gray-600 text-white px-4 py-2 rounded-lg font-medium 
                    cursor-pointer hover:bg-gray-800 transition-all">Cadastrar</button>

                    <button class="border-[0.1rem] border-gray-300 text-black px-4 py-2 rounded-lg font-medium cursor-pointer hover:bg-gray-200 transition-all">Cadastrar</button>
                    
                 </div>

            </div>

            

            
        </div>

        


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://kit.fontawesome.com/9898c47017.js" crossorigin="anonymous"></script>
    <script src="/script.js"></script>
</body>
</html>
