<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerente de Estoque: Sistema de Gerenciamento de Estoque</title>
    <link rel="shortcut icon" href="/logo/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="font-poppins bg-gray-50">

        <main>

            <section>
                <div class="bg-white w-80 h-screen border-gray-300 border-r-[0.1rem] drop-shadow-sm">
                    <div class="bg-white w-80 h-40 border-gray-300 border-b-[0.1rem] border-r-[0.1rem]">
                        <div class="flex flex-col justify-center items-start mx-auto px-8 pt-6">
                            <div class="mx-auto w-12 h-12 mb-3 p-1 bg-blue-600 rounded-full">
                                <img class="" src="/logo/logo.png" alt="">
                            </div>
                            <h1 class="text-blue-600 text-2xl font-bold">Gerente de Estoque</h1>
                            <p class="text-gray-600 text-lg">Sistema de Estoque</p>
                        </div>

                    </div>

                    <!-- Painel -->

                <div class="px-5 pt-5">
                    <div class="flex flex-col gap-3">
                        <a href="">
                            <div class="rounded-lg hover:bg-blue-700 hover:transition-all hover:duration-300
                            hover:ease-in-out bg-blue-600 p-3 w-full flex items-center cursor-pointer gap-5">

                            <i class="text-white text-[20px] font-extralight fa-solid fa-cube"></i>
                            <P class="text-white text-[16px] font-light">Dashboard</P>

                        </div>
                        </a>

                    </div>
                </div>

                    <!-- Produtos -->

                <div class="px-5 pt-3">
                    <div class="flex flex-col gap-3">
                        <a href="#">
                            <div class="rounded-lg hover:transition-all hover:duration-300
                            hover:ease-in-out hover:bg-gray-100 p-3 w-full flex items-center cursor-pointer gap-5">

                            <i class="text-black text-[20px] font-extralight fa-solid fa-box"></i>
                            <P class="text-black text-[16px] font-light">Produtos</P>

                        </div>
                        </a>

                    </div>
                </div>
                
                    <!-- Movimentações -->

                <div class="px-5 pt-3">
                    <div class="flex flex-col gap-3">
                        <a href="#">
                            <div class="rounded-lg hover:transition-all hover:duration-300
                            hover:ease-in-out hover:bg-gray-100 p-3 w-full flex items-center cursor-pointer gap-5">

                            <i class="text-black text-[20px] font-extralight fa-solid fa-chart-simple"></i>
                            <P class="text-black text-[16px] font-light">Movimentações</P>

                        </div>
                        </a>

                    </div>
                </div>

                    <!-- Fornecedores -->

                <div class="px-5 pt-3">
                    <div class="flex flex-col gap-3">
                        <a href="#">
                            <div class="rounded-lg hover:transition-all hover:duration-300
                            hover:ease-in-out hover:bg-gray-100 p-3 w-full flex items-center cursor-pointer gap-5">

                            <i class="text-black text-[20px] font-extralight fa-solid fa-user-group"></i>
                            <P class="text-black text-[16px] font-light">Fornecedores</P>

                        </div>
                        </a>

                    </div>
                </div>

                    <!-- Relatórios -->

                <div class="px-5 pt-3">
                    <div class="flex flex-col gap-3">
                        <a href="#">
                            <div class="rounded-lg hover:transition-all hover:duration-300
                            hover:ease-in-out hover:bg-gray-100 p-3 w-full flex items-center cursor-pointer gap-5">

                            <i class="text-black text-[20px] font-extralight fa-solid fa-file"></i>
                            <P class="text-black text-[16px] font-light">Relatórios</P>

                        </div>
                        </a>

                    </div>
                </div>

                    <!-- Alertas -->

                <div class="px-5 pt-3">
                    <div class="flex flex-col gap-3">
                        <a href="#">
                            <div class="rounded-lg hover:transition-all hover:duration-300
                            hover:ease-in-out hover:bg-gray-100 p-3 w-full flex items-center cursor-pointer gap-5">

                            <i class="text-black text-[20px] font-extralight fa-solid fa-circle-exclamation"></i>
                            <P class="text-black text-[16px] font-light">Alertas</P>

                        </div>
                        </a>

                    </div>
                </div>






                 </div>
            </section>

        </main>
    
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="https://kit.fontawesome.com/9898c47017.js" crossorigin="anonymous"></script>
    <script src="/script.js"></script>
</body>
</html>
